<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Узнай о Taxi1</title>
  <style>
    :root{
      --bg: #0b0f14;
      --panel: #0f1720;
      --border: rgba(255,255,255,0.10);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.65);
      --btn: #ffffff;
      --btnText: #0b0f14;
      --bubbleA: rgba(255,255,255,0.08);
      --bubbleB: rgba(255,255,255,0.12);
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
      --radius: 18px;
      --maxw: 900px;
      --pad: 14px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    @media (prefers-color-scheme: light){
      :root{
        --bg: #f7f7f8;
        --panel: #ffffff;
        --border: rgba(0,0,0,0.10);
        --text: rgba(0,0,0,0.90);
        --muted: rgba(0,0,0,0.55);
        --btn: #0b0f14;
        --btnText: #ffffff;
        --bubbleA: rgba(0,0,0,0.05);
        --bubbleB: rgba(0,0,0,0.07);
        --shadow: 0 10px 30px rgba(0,0,0,0.08);
      }
    }

    html, body { height: 100%; }
    body{
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .app{
      height: var(--appH, 100vh);
      display: flex;
      flex-direction: column;
    }

    header{
      flex: 0 0 auto;
      padding: 12px max(var(--pad), env(safe-area-inset-right)) 12px max(var(--pad), env(safe-area-inset-left));
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .title{
      font-size: 14px;
      letter-spacing: 0.2px;
      color: var(--muted);
      user-select: none;
    }
    .saveBtn{
      display: none;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
    }
    .saveBtn:hover{ background: rgba(255,255,255,0.05); }

    main{
      flex: 1 1 auto;
      display: flex;
      justify-content: center;
      padding: 0 max(var(--pad), env(safe-area-inset-right)) 0 max(var(--pad), env(safe-area-inset-left));
      min-height: 0;
    }

    .wrap{
      width: 100%;
      max-width: var(--maxw);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .startScreen{
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 0 22px 0;
      min-height: 0;
    }
    .startBtn{
      border: 0;
      background: var(--btn);
      color: var(--btnText);
      padding: 18px 22px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow);
      min-width: min(420px, 92vw);
    }
    .startBtn:active{ transform: translateY(1px); }

    .chatUI{
      display: none;
      flex: 1 1 auto;
      min-height: 0;
      gap: 12px;
      padding: 6px 0 12px 0;
    }

    .chatBox{
      flex: 1 1 auto;
      min-height: 0;
      border: 1px solid var(--border);
      background: color-mix(in oklab, var(--panel) 92%, transparent);
      border-radius: var(--radius);
      overflow: auto;
      padding: 14px;
    }

    .msg{
      display: flex;
      margin: 10px 0;
      line-height: 1.35;
      font-size: 15px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.you{ justify-content: flex-end; }
    .bubble{
      max-width: 86%;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--bubbleA);
    }
    .you .bubble{ background: var(--bubbleB); }

    .composer{
      flex: 0 0 auto;
      display: flex;
      gap: 10px;
      padding: 0 0 max(10px, env(safe-area-inset-bottom)) 0;
      align-items: flex-end;
    }
    .input{
      flex: 1 1 auto;
      border: 1px solid var(--border);
      background: color-mix(in oklab, var(--panel) 92%, transparent);
      color: var(--text);
      border-radius: 18px;
      padding: 12px 12px;
      font-size: 15px;
      outline: none;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      overflow: auto;
    }
    .sendBtn{
      flex: 0 0 auto;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--btn);
      color: var(--btnText);
      font-size: 18px;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    .sendBtn:disabled{
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .status{
      font-size: 12px;
      color: var(--muted);
      padding: 0 2px;
      min-height: 16px;
      user-select: none;
    }

    @media (max-width: 420px){
      .startBtn{ font-size: 17px; padding: 16px 18px; }
      .chatBox{ padding: 12px; }
      .bubble{ max-width: 92%; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header>
      <div class="title">Узнай о Taxi1</div>
      <button class="saveBtn" id="saveBtn">Сохранить</button>
    </header>

    <main>
      <div class="wrap">
        <section class="startScreen" id="startScreen">
          <button class="startBtn" id="startBtn">Начать общение</button>
        </section>

        <section class="chatUI" id="chatUI">
          <div class="chatBox" id="chatBox" aria-live="polite" aria-label="Чат"></div>
          <div class="status" id="status"></div>

          <div class="composer">
            <textarea class="input" id="input" placeholder="Напишите сообщение..." rows="1"></textarea>
            <button class="sendBtn" id="sendBtn" title="Отправить">►</button>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    // === n8n webhook (production) ===
    const N8N_WEBHOOK_URL = "https://hbpadmin1.app.n8n.cloud/webhook/taxi1-chat";

    // n8n возвращает JSON, где ответ лежит в $json.output
    const RESPONSE_FIELD = "output";

    const startBtn = document.getElementById("startBtn");
    const startScreen = document.getElementById("startScreen");
    const chatUI = document.getElementById("chatUI");
    const chatBox = document.getElementById("chatBox");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const saveBtn = document.getElementById("saveBtn");
    const statusEl = document.getElementById("status");

    const transcript = []; // { role: "you"|"taxi1", text: string, ts: Date }

    const greetText = "Здравствуйте! Я помогаю разобраться в работе с нашим сервисом. Какие у вас есть вопросы?";

    function pad2(n){ return String(n).padStart(2,"0"); }
    function formatTs(d){
      return `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
    }

    function setStatus(t){ statusEl.textContent = t || ""; }

    function addMessage(role, text, ts = new Date()){
      const item = { role, text, ts };
      transcript.push(item);

      const row = document.createElement("div");
      row.className = "msg " + (role === "you" ? "you" : "taxi1");

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      row.appendChild(bubble);
      chatBox.appendChild(row);

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function openChat(){
      startScreen.style.display = "none";
      chatUI.style.display = "flex";
      saveBtn.style.display = "inline-flex";
      addMessage("taxi1", greetText, new Date());
      setTimeout(() => input.focus(), 50);
    }

    function buildTxtExport(){
      return transcript.map(m => {
        const who = (m.role === "you") ? "Вы" : "Taxi1";
        return `[${formatTs(m.ts)}] ${who}: ${m.text}`;
      }).join("\n");
    }

    function downloadTxt(filename, content){
      const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function callN8N(userText){
      // Отправляем в n8n минимальный payload:
      // { message, history }
      const payload = {
        message: userText,
        history: transcript.map(m => ({
          role: m.role,
          text: m.text,
          ts: m.ts.toISOString()
        }))
      };

      const res = await fetch(N8N_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!res.ok){
        const errText = await res.text().catch(() => "");
        throw new Error("n8n вернул ошибку: " + res.status + (errText ? (": " + errText.slice(0, 300)) : ""));
      }

      const ct = (res.headers.get("content-type") || "").toLowerCase();

      // Обычно n8n отдаёт JSON. Но подстрахуемся.
      if (ct.includes("application/json")){
        const data = await res.json();
        const val = data?.[RESPONSE_FIELD];
        if (val === undefined || val === null) {
          // Если вдруг воркфлоу вернул другой формат — покажем JSON как строку
          return JSON.stringify(data);
        }
        return String(val);
      } else {
        // fallback: plain text
        return await res.text();
      }
    }

    function autosizeTextarea(){
      input.style.height = "auto";
      const next = Math.min(input.scrollHeight, 140);
      input.style.height = Math.max(next, 44) + "px";
    }

    async function onSend(){
      const text = (input.value || "").trim();
      if (!text) return;

      addMessage("you", text, new Date());
      input.value = "";
      autosizeTextarea();

      sendBtn.disabled = true;
      setStatus("Taxi1 печатает...");

      try{
        const reply = await callN8N(text);
        addMessage("taxi1", (reply || "").trim() || "…", new Date());
      }catch(e){
        addMessage(
          "taxi1",
          "Не удалось получить ответ. Проверьте webhook n8n и CORS.\n\nДетали: " + (e && e.message ? e.message : e),
          new Date()
        );
      }finally{
        setStatus("");
        sendBtn.disabled = false;
        input.focus();
      }
    }

    // === Подстройка под клавиатуру на телефоне (VisualViewport) ===
    function setAppHeight(){
      const vv = window.visualViewport;
      const h = vv ? vv.height : window.innerHeight;
      document.documentElement.style.setProperty("--appH", h + "px");
    }
    setAppHeight();
    window.addEventListener("resize", setAppHeight);
    if (window.visualViewport){
      window.visualViewport.addEventListener("resize", setAppHeight);
      window.visualViewport.addEventListener("scroll", setAppHeight);
    }

    // === Events ===
    startBtn.addEventListener("click", openChat);

    sendBtn.addEventListener("click", onSend);
    input.addEventListener("input", autosizeTextarea);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        onSend();
      }
    });

    saveBtn.addEventListener("click", () => {
      const d = new Date();
      const file = `taxi1_chat_${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}_${pad2(d.getHours())}-${pad2(d.getMinutes())}-${pad2(d.getSeconds())}.txt`;
      downloadTxt(file, buildTxtExport());
    });

    autosizeTextarea();
  </script>
</body>
</html>
