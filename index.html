<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Узнай о Taxi1.ru</title>

<style>

:root{
--bg:#f2f2f2;
--panel:#fff;
--line:rgba(0,0,0,.12);
--text:rgba(0,0,0,.88);
--muted:rgba(0,0,0,.55);
--bubble:#e7e7e7;
--btn:#000;
--btnText:#fff;
--shadow:0 10px 30px rgba(0,0,0,.08);
--font:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
--maxw:980px;
--pad:16px;
}

html,body{height:100%}

body{
margin:0;
font-family:var(--font);
font-size:16px;
background:var(--bg);
color:var(--text);
overflow:hidden;
}

.app{
height:var(--appH,100vh);
display:flex;
flex-direction:column;
}

header{
background:var(--panel);
border-bottom:1px solid var(--line);
padding:14px var(--pad);
}

.topbar{
max-width:var(--maxw);
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
}

.brand svg{width:160px}

.saveBtn{
display:none;
background:#000;
color:#fff;
border:0;
border-radius:999px;
padding:10px 16px;
font-weight:700;
cursor:pointer;
}

main{
flex:1;
display:flex;
justify-content:center;
padding:0 var(--pad);
min-height:0;
}

.wrap{
width:100%;
max-width:var(--maxw);
display:flex;
flex-direction:column;
min-height:0;
}

.startScreen{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

.startBtn{
background:#000;
color:#fff;
border:0;
border-radius:999px;
padding:16px 24px;
font-weight:700;
font-size:16px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.chatUI{
display:none;
flex-direction:column;
flex:1;
min-height:0;
}

.chatArea{
flex:1;
overflow:auto;
padding:20px 0;
}

.msg{
display:flex;
margin:18px 0;
}

.msg.taxi1{justify-content:flex-start}
.msg.you{justify-content:flex-end}

.msg.you .content{
background:var(--bubble);
border-radius:16px;
padding:10px 14px;
}

.content{
max-width:560px;
white-space:pre-wrap;
line-height:1.45;
}

.composerWrap{
padding-bottom:14px;
}

.composerCard{
display:flex;
align-items:center;
background:var(--panel);
border:1px solid var(--line);
border-radius:999px;
box-shadow:var(--shadow);
padding:8px 10px;
}

.input{
flex:1;
border:0;
outline:none;
font-size:16px;
padding:10px 14px;
resize:none;
min-height:24px;
max-height:140px;
background:transparent;
}

.sendBtn{
width:44px;
height:44px;
border-radius:999px;
border:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.sendBtn svg{
width:18px;
height:18px;
}

.sendBtn:disabled{
background:#d0d0d0;
cursor:not-allowed;
}

.status{
font-size:12px;
color:var(--muted);
margin-top:6px;
height:16px;
}

.fadeIn{
animation:fade .2s ease-out;
}

@keyframes fade{
from{opacity:0;transform:translateY(6px)}
to{opacity:1}
}

</style>
</head>

<body>

<div class="app">

<header>
<div class="topbar">

<div class="brand">

<svg viewBox="0 0 540 90">

<defs>
<linearGradient id="y" x1="0" x2="0" y1="0" y2="1">
<stop offset="0" stop-color="#ffd64a"/>
<stop offset="1" stop-color="#f3c400"/>
</linearGradient>
</defs>

<text x="0" y="62" font-size="56" font-weight="800" fill="#111">Узнай о Taxi</text>
<rect x="360" y="14" rx="14" width="64" height="64" fill="url(#y)"/>
<text x="381" y="63" font-size="52" font-weight="900" fill="#111">1</text>
<text x="432" y="62" font-size="56" font-weight="800" fill="#111">.ru</text>

</svg>

</div>

<button class="saveBtn" id="saveBtn">Сохранить</button>

</div>
</header>

<main>

<div class="wrap">

<section class="startScreen" id="startScreen">
<button class="startBtn" id="startBtn">Начать общение</button>
</section>

<section class="chatUI" id="chatUI">

<div class="chatArea" id="chatArea"></div>

<div class="composerWrap">

<div class="composerCard">

<textarea
class="input"
id="input"
rows="1"
placeholder="Начните общение"></textarea>

<button class="sendBtn" id="sendBtn">

<svg viewBox="0 0 24 24" fill="none">
<path d="M21 3L10 14" stroke="white" stroke-width="2"/>
<path d="M21 3L14 21l-4-7-7-4 18-7Z"
stroke="white"
stroke-width="2"/>
</svg>

</button>

</div>

<div class="status" id="status"></div>

</div>

</section>

</div>

</main>

</div>

<script>

const N8N_WEBHOOK_URL="https://hbpadmin1.app.n8n.cloud/webhook/taxi1-chat"

const startBtn=document.getElementById("startBtn")
const startScreen=document.getElementById("startScreen")
const chatUI=document.getElementById("chatUI")
const chatArea=document.getElementById("chatArea")
const input=document.getElementById("input")
const sendBtn=document.getElementById("sendBtn")
const saveBtn=document.getElementById("saveBtn")
const statusEl=document.getElementById("status")

const transcript=[]

const greetText="Здравствуйте! Я помогаю разобраться в работе с нашим сервисом. Какие у вас есть вопросы?"

function pad(n){return String(n).padStart(2,"0")}

function formatTs(d){
return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`
}

function addMessage(role,text,ts=new Date()){

transcript.push({role,text,ts})

const row=document.createElement("div")
row.className="msg "+(role==="you"?"you":"taxi1")

const content=document.createElement("div")
content.className="content"
content.textContent=text

row.appendChild(content)
chatArea.appendChild(row)

chatArea.scrollTop=chatArea.scrollHeight

}

function autosize(){
input.style.height="auto"
input.style.height=Math.min(input.scrollHeight,140)+"px"
}

function updateSendButton(){
sendBtn.disabled=input.value.trim().length===0
}

async function callN8N(text){

const payload={
message:text,
history:transcript
}

const res=await fetch(N8N_WEBHOOK_URL,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify(payload)
})

const data=await res.json()

return (data.reply||"").replace(/\\n/g,"\n")

}

async function onSend(){

const text=input.value.trim()
if(!text)return

addMessage("you",text)

input.value=""
autosize()
updateSendButton()

statusEl.textContent="Taxi1 печатает..."

try{

const reply=await callN8N(text)

addMessage("taxi1",reply)

}catch(e){

addMessage("taxi1","Ошибка получения ответа")

}

statusEl.textContent=""
input.focus()

}

function openChat(){

startScreen.style.display="none"
chatUI.style.display="flex"
chatUI.classList.add("fadeIn")
saveBtn.style.display="block"

addMessage("taxi1",greetText)

setTimeout(()=>input.focus(),50)

}

function buildTxt(){

return transcript.map(m=>{
const who=m.role==="you"?"Вы":"Taxi1"
return `[${formatTs(m.ts)}] ${who}: ${m.text}`
}).join("\n")

}

saveBtn.onclick=()=>{

const d=new Date()

const file=`taxi1_chat_${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}.txt`

const blob=new Blob([buildTxt()],{type:"text/plain"})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download=file
a.click()

URL.revokeObjectURL(url)

}

startBtn.onclick=openChat
sendBtn.onclick=onSend

input.addEventListener("input",()=>{
autosize()
updateSendButton()
})

input.addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault()
onSend()
}
})

function setAppHeight(){
const vv=window.visualViewport
const h=vv?vv.height:window.innerHeight
document.documentElement.style.setProperty("--appH",h+"px")
}

setAppHeight()

window.addEventListener("resize",setAppHeight)

if(window.visualViewport){
visualViewport.addEventListener("resize",setAppHeight)
visualViewport.addEventListener("scroll",setAppHeight)
}

updateSendButton()

</script>

</body>
</html>
